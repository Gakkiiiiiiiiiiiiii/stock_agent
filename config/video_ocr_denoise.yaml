# 行情软件（通达信等）界面噪声过滤配置。
# 判定规则（误杀宁可保守）：
#   1. 一行命中 >= min_ui_term_hits 个不同 UI 词，判为界面噪声；
#   2. 整行仅由 period_tokens 中的周期栏词组成（>=2 个词），判为周期栏噪声。
# 行情数字、板块名、个股名一律保留。
min_ui_term_hits: 2
ui_terms:
  - 系统
  - 功能
  - 深度
  - 报价
  - 分析
  - 扩展
  - 市场
  - 行情
  - 资讯
  - 交易
  - 服务
  - 工具
  - 帮助
  - 策略
  - 发现
  - 更多
  - 问小达
  - TQ策略
  - 分时周期
  - 前复权
  - 后复权
  - 不复权
  - 画线
  - F10
  - 逐笔
  - 通达信
  - 主页
  - 动态
  - 投稿
  - 追番
  - 追剧
  - 关注数
  - 粉丝数
  - 弹幕
  - 点赞
  - 投币
  - 收藏
period_tokens:
  - 分时
  - 日线
  - 周线
  - 月线
  - 季线
  - 年线
  - 分钟
  - 多周期
  - 前复权
  - 后复权
  - 不复权
