services:
  postgres:
    image: postgres:16
    container_name: financial_agent_postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent_pass
      POSTGRES_DB: financial_agent
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./storage/migrations:/docker-entrypoint-initdb.d:ro

  qdrant:
    image: qdrant/qdrant:latest
    container_name: financial_agent_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  redis:
    image: redis:7
    container_name: financial_agent_redis
    ports:
      - "6379:6379"

  reranker:
    build: .
    container_name: financial_agent_reranker
    command: uvicorn workers.reranker_api:app --host 0.0.0.0 --port 8010
    env_file:
      - .env
    environment:
      FFMPEG_BIN: /usr/bin/ffmpeg
      FFPROBE_BIN: /usr/bin/ffprobe
    ports:
      - "8010:8010"
    volumes:
      - ./app:/app/app
      - ./agent:/app/agent
      - ./config:/app/config
      - ./engines:/app/engines
      - ./financial_agent:/app/financial_agent
      - ./mcp_servers:/app/mcp_servers
      - ./scripts:/app/scripts
      - ./workers:/app/workers
      - ./storage:/app/storage
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./README.md:/app/README.md:ro
    depends_on:
      - redis

  api:
    build: .
    container_name: financial_agent_api
    env_file:
      - .env
    environment:
      ASR_MODEL_SIZE: large-v3
      ASR_DEVICE: cuda
      ASR_COMPUTE_TYPE: float16
      ASR_USE_BATCHED: "true"
      ASR_BATCH_SIZE: "4"
      ASR_BEAM_SIZE: "5"
      HF_ENDPOINT: https://hf-mirror.com
      HF_HUB_DISABLE_XET: "1"
      FFMPEG_BIN: /usr/bin/ffmpeg
      FFPROBE_BIN: /usr/bin/ffprobe
      VIDEO_OCR_DEVICE: gpu:0
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./app:/app/app
      - ./agent:/app/agent
      - ./config:/app/config
      - ./engines:/app/engines
      - ./financial_agent:/app/financial_agent
      - ./knowledge_base:/app/knowledge_base
      - ./mcp_servers:/app/mcp_servers
      - ./scripts:/app/scripts
      - ./skills:/app/skills
      - ./storage:/app/storage
      - ./workers:/app/workers
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./README.md:/app/README.md:ro
    depends_on:
      - postgres
      - qdrant
      - redis
      - reranker

  vector_worker:
    build: .
    container_name: financial_agent_vector_worker
    command: python workers/vector_index_worker.py
    env_file:
      - .env
    environment:
      ASR_MODEL_SIZE: large-v3
      ASR_DEVICE: cuda
      ASR_COMPUTE_TYPE: float16
      ASR_USE_BATCHED: "true"
      ASR_BATCH_SIZE: "4"
      ASR_BEAM_SIZE: "5"
      HF_ENDPOINT: https://hf-mirror.com
      HF_HUB_DISABLE_XET: "1"
      FFMPEG_BIN: /usr/bin/ffmpeg
      FFPROBE_BIN: /usr/bin/ffprobe
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./app:/app/app
      - ./agent:/app/agent
      - ./config:/app/config
      - ./engines:/app/engines
      - ./financial_agent:/app/financial_agent
      - ./knowledge_base:/app/knowledge_base
      - ./mcp_servers:/app/mcp_servers
      - ./scripts:/app/scripts
      - ./skills:/app/skills
      - ./storage:/app/storage
      - ./workers:/app/workers
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./README.md:/app/README.md:ro
    depends_on:
      - postgres
      - qdrant
      - redis
      - reranker

volumes:
  hf_cache:
