services:
  postgres:
    image: postgres:16
    container_name: financial_agent_postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent_pass
      POSTGRES_DB: financial_agent
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./storage/migrations:/docker-entrypoint-initdb.d:ro

  qdrant:
    image: qdrant/qdrant:latest
    container_name: financial_agent_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  redis:
    image: redis:7
    container_name: financial_agent_redis
    ports:
      - "6379:6379"

  reranker:
    build: .
    container_name: financial_agent_reranker
    command: uvicorn workers.reranker_api:app --host 0.0.0.0 --port 8010
    env_file:
      - .env
    ports:
      - "8010:8010"
    volumes:
      - ./app:/app/app
      - ./agent:/app/agent
      - ./config:/app/config
      - ./engines:/app/engines
      - ./financial_agent:/app/financial_agent
      - ./mcp_servers:/app/mcp_servers
      - ./workers:/app/workers
      - ./storage:/app/storage
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./README.md:/app/README.md:ro
    depends_on:
      - redis

  api:
    build: .
    container_name: financial_agent_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./agent:/app/agent
      - ./config:/app/config
      - ./engines:/app/engines
      - ./financial_agent:/app/financial_agent
      - ./knowledge_base:/app/knowledge_base
      - ./mcp_servers:/app/mcp_servers
      - ./skills:/app/skills
      - ./storage:/app/storage
      - ./workers:/app/workers
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./README.md:/app/README.md:ro
    depends_on:
      - postgres
      - qdrant
      - redis
      - reranker

  vector_worker:
    build: .
    container_name: financial_agent_vector_worker
    command: python workers/vector_index_worker.py
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./agent:/app/agent
      - ./config:/app/config
      - ./engines:/app/engines
      - ./financial_agent:/app/financial_agent
      - ./knowledge_base:/app/knowledge_base
      - ./mcp_servers:/app/mcp_servers
      - ./skills:/app/skills
      - ./storage:/app/storage
      - ./workers:/app/workers
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./README.md:/app/README.md:ro
    depends_on:
      - postgres
      - qdrant
      - redis
      - reranker
